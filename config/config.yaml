# config/config.yaml

# General configuration
project_name: "TagLish: Code-Switched Speech Recognition"
version: "1.0"

# Paths
paths:
  raw_data_dir: "data/raw/"
  processed_data_dir: "data/processed/"
  features_dir: "data/features/"
  checkpoints_dir: "models/checkpoints/"
  pretrained_model_dir: "models/pretrained/"
  logs_dir: "logs/"
  output_dir: "output/"
  # Add the path where the downloaded model is stored
  download_model_script: "scripts/download_model.py"

# Model configuration
model:
  wav2vec2_model_name: "facebook/wav2vec2-large-xlsr-53"
  use_pretrained: True
  pretrained_model_path: "models/pretrained/wav2vec2-large-xlsr-53"
  num_languages: 2  # Tagalog-English code-switched
  
# Speaker Diarization - X-vector
xvector_diarization:
  embedding_dim: 512  # Change as needed for x-vector
  num_speakers: 2  # Initially assuming 2 speakers for multi-speaker ID
  diarization_method: "x-vector"

# Dataset configuration
dataset:
  sample_rate: 16000  # Wav2Vec2 typically uses 16kHz audio
  batch_size: 16  # Modify based on available memory
  shuffle: True
  num_workers: 4  # For data loading

# Training configuration
training:
  epochs: 20
  learning_rate: 1e-4
  optimizer: "adam"
  loss_function: "ctc_loss"
  validation_split: 0.1  # 10% data for validation
  early_stopping: True
  patience: 5  # Stop training if no improvement for 5 epochs

# GPU configuration
device:
  use_gpu: True  # Enable this to use GPU
  gpu_id: 0  # Modify if using specific GPU
  
# Logging and checkpointing
logging:
  log_interval: 100  # Log after every 100 batches
  checkpoint_interval: 1  # Save checkpoint after every epoch
  tensorboard: True  # Enable TensorBoard logging

# Placeholder for additional configuration settings
