# General project configurations
project:
  name: "TagLish: Fine-Tuning Wav2Vec Model with Speaker Diarization"
  version: "1.0"
  python_version: "3.12.6"

# Paths for data, models, and outputs
paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  features: "data/features/"
  pretrained_model: "models/pretrained/wav2vec2-large-xlsr-53/"
  checkpoints: "models/checkpoints/"
  logs: "logs/"
  results: "results/"
  tokenizer: "models/tokenizer/"  # Updated path for the custom tokenizer
  audio_utils: "src/utils/audio_utils.py"
  model_config: "config/config.yaml"
  custom_vocab_file: "data/tokenizer/vocab.json"  # Path to the custom vocabulary file
  merges_file: "data/tokenizer/merges.txt"  # Path to the BPE merges file if using BPE
  
# Model configurations
model:
  wav2vec2:
    pretrained_model_path: "models/pretrained/wav2vec2-large-xlsr-53/"
    tokenizer_path: "models/tokenizer/"  # Path to custom tokenizer
    vocab_size: 32  # Adjusted vocab size based on your needs
    use_pretrained: true
    sample_rate: 16000  # Ensure all audio is resampled to 16kHz
    output_hidden_states: false
  speaker_diarization:
    x_vector_model_path: "models/x-vector/"
    tdnn_architecture: "small"  # Small version of TDNN for speaker diarization
    use_pretrained: false  # True if you want to load a pretrained speaker diarization model
    num_speakers: 2  # Default assumption, can be dynamic during clustering

# Training configurations
training:
  epochs: 30
  batch_size: 16
  learning_rate: 3e-5
  validation_split: 0.2
  optimizer: "adam"
  gradient_accumulation_steps: 2
  early_stopping: true
  early_stopping_patience: 5
  seed: 42

# GPU configurations
gpu:
  use_gpu: true  # Automatically switch to GPU if available
  device: "cuda"  # "cuda" for GPU, "cpu" for fallback
  mixed_precision: true  # Enable if mixed-precision training is supported

# Validation & Checkpoints
validation:
  evaluate_every: 500  # Evaluate the model after every 500 steps
  save_best_only: true  # Only save the best checkpoint
  checkpoint_dir: "models/checkpoints/"

# Data Preprocessing Configurations
preprocessing:
  resample_rate: 16000
  vad: true  # Apply Voice Activity Detection (VAD) to remove non-speech segments
  normalize: true
  mfcc_features:
    enabled: true
    n_mfcc: 23  # Number of MFCCs to extract

# Tokenizer Configuration
tokenizer:
  vocab_size: 32
  vocab_file: "data/tokenizer/vocab.json"  # Path to the custom vocabulary file
  merges_file: "data/tokenizer/merges.txt"  # Path to the BPE merges file
  type: "bpe"  # Type of tokenizer (can be 'bpe' for Byte Pair Encoding)

# Diarization Clustering Configurations
clustering:
  method: "ahc"  # Agglomerative Hierarchical Clustering
  plda: true  # Use PLDA for scoring
  threshold: 0.5  # Clustering threshold
